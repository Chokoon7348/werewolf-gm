<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wolf Note - เข้าร่วมเกม</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/20 via-[#0b0f19] to-[#0b0f19]"></div>

    <div id="join-section" class="w-full max-w-sm bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl z-10 relative">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-indigo-500/10 text-indigo-400 rounded-2xl mb-4">
                <i class="ph-fill ph-users-three text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">เข้าร่วมเกม</h1>
            <p class="text-slate-400 text-sm mt-2">กรอกรหัสจาก GM เพื่อเข้าห้อง</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2">รหัสห้อง (PIN)</label>
                <input type="number" id="pin-input" placeholder="ตัวเลข 4 หลัก" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white text-center text-2xl font-bold tracking-widest focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" pattern="\d*">
            </div>
            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2">ชื่อของคุณ</label>
                <input type="text" id="name-input" placeholder="เช่น โชกุน, Sarah" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white text-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
            </div>
            <button id="join-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all hover:-translate-y-1 shadow-[0_10px_20px_-10px_rgba(79,70,229,0.5)] mt-4">
                เข้าสู่ห้องเกม
            </button>
        </div>
    </div>

    <div id="waiting-section" class="hidden w-full max-w-sm text-center z-10 relative">
        <i class="ph-fill ph-hourglass-high text-6xl text-amber-400 animate-pulse mb-6"></i>
        <h2 class="text-2xl font-bold text-white mb-2" id="welcome-name">รอสักครู่...</h2>
        <p class="text-slate-400">กำลังรอ GM เริ่มเกมและแจกบทบาท</p>
        <div class="mt-8 p-4 bg-slate-900 border border-slate-800 rounded-2xl">
            <p class="text-sm text-slate-500">รหัสห้อง: <span id="display-room-pin" class="font-bold text-indigo-400">----</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, child } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        // กุญแจ Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyBn-t7mx3_Hb8gjL18SgCeRjVJCGG9N_DI",
            authDomain: "wolf-note.firebaseapp.com",
            projectId: "wolf-note",
            storageBucket: "wolf-note.firebasestorage.app",
            messagingSenderId: "783649820868",
            appId: "1:783649820868:web:b7bb2a89b94b730c54b991"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ตัวแปรหน้าจอ
        const joinSection = document.getElementById('join-section');
        const waitingSection = document.getElementById('waiting-section');
        const joinBtn = document.getElementById('join-btn');
        const pinInput = document.getElementById('pin-input');
        const nameInput = document.getElementById('name-input');
        const welcomeName = document.getElementById('welcome-name');
        const displayRoomPin = document.getElementById('display-room-pin');

        joinBtn.addEventListener('click', () => {
            const pin = pinInput.value.trim();
            const playerName = nameInput.value.trim();

            if(pin.length !== 4) { alert("กรุณากรอกรหัส PIN 4 หลัก"); return; }
            if(playerName === "") { alert("กรุณากรอกชื่อของคุณ"); return; }

            // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
            joinBtn.innerText = "กำลังตรวจสอบ...";
            joinBtn.disabled = true;

            const dbRef = ref(db);
            // ตรวจสอบว่ามีห้องนี้อยู่จริงไหม
            get(child(dbRef, `rooms/${pin}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    // ถ้ามีห้อง ให้เพิ่มชื่อผู้เล่นลงไป
                    const newPlayerRef = push(ref(db, `rooms/${pin}/players`));
                    set(newPlayerRef, {
                        name: playerName,
                        role: "waiting", // ยังไม่ได้แจกบท
                        status: "alive"
                    }).then(() => {
                        // เข้าร่วมสำเร็จ เปลี่ยนหน้าจอ
                        joinSection.classList.add('hidden');
                        waitingSection.classList.remove('hidden');
                        welcomeName.innerText = `สวัสดี, ${playerName}!`;
                        displayRoomPin.innerText = pin;
                    });
                } else {
                    alert("❌ ไม่พบห้องนี้! กรุณาตรวจสอบรหัส PIN อีกครั้ง");
                    joinBtn.innerText = "เข้าสู่ห้องเกม";
                    joinBtn.disabled = false;
                }
            }).catch((error) => {
                alert("เกิดข้อผิดพลาด: " + error);
                joinBtn.innerText = "เข้าสู่ห้องเกม";
                joinBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
