<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wolf Note - เข้าร่วมเกม</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0b0f19; color: #e2e8f0; font-family: 'Inter', 'Noto Sans Thai', sans-serif; }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/20 via-[#0b0f19] to-[#0b0f19]"></div>

    <!-- 1. หน้ากรอกรหัส -->
    <div id="join-section" class="w-full max-w-sm bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl z-10 relative">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-tight">เข้าร่วมเกม</h1>
        </div>
        <div class="space-y-5">
            <input type="number" id="pin-input" placeholder="รหัสห้อง 4 หลัก" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white text-center text-2xl font-bold focus:border-indigo-500 outline-none">
            <input type="text" id="name-input" placeholder="ชื่อของคุณ" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white text-lg focus:border-indigo-500 outline-none">
            <button id="join-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg mt-4">เข้าสู่ห้องเกม</button>
        </div>
    </div>

    <!-- 2. หน้ารอ GM -->
    <div id="waiting-section" class="hidden w-full max-w-sm text-center z-10 relative">
        <i class="ph-fill ph-hourglass-high text-6xl text-amber-400 animate-pulse mb-6"></i>
        <h2 class="text-2xl font-bold text-white mb-2" id="welcome-name">รอสักครู่...</h2>
        <p class="text-slate-400">กำลังรอ GM เริ่มเกมและแจกบทบาท</p>
    </div>

    <!-- 3. หน้าโชว์การ์ดบทบาท (ใหม่ล่าสุด 🌟) -->
    <div id="role-section" class="hidden w-full max-w-sm z-10 relative">
        <div id="role-card" class="bg-slate-900 border-2 rounded-3xl p-8 text-center shadow-2xl transform transition-all duration-500 scale-90 opacity-0">
            <div id="role-icon-box" class="w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-lg">
                <i id="role-icon" class="text-5xl text-white"></i>
            </div>
            <h3 class="text-slate-400 font-medium mb-1">บทบาทของคุณคือ</h3>
            <h1 id="role-name" class="text-4xl font-black text-white mb-4 tracking-tight">...</h1>
            <p id="role-desc" class="text-slate-300 text-sm leading-relaxed pb-6 border-b border-slate-800">...</p>
            <div class="mt-6">
                <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">ห้ามให้ใครดูหน้าจอนี้!</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, child, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn-t7mx3_Hb8gjL18SgCeRjVJCGG9N_DI",
            authDomain: "wolf-note.firebaseapp.com",
            databaseURL: "https://wolf-note-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wolf-note",
            storageBucket: "wolf-note.firebasestorage.app",
            messagingSenderId: "783649820868",
            appId: "1:783649820868:web:b7bb2a89b94b730c54b991"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myPlayerId = ""; // ตัวแปรเก็บรหัสประจำตัวของเครื่องนี้

        const joinSection = document.getElementById('join-section');
        const waitingSection = document.getElementById('waiting-section');
        const roleSection = document.getElementById('role-section');
        const roleCard = document.getElementById('role-card');

        document.getElementById('join-btn').addEventListener('click', () => {
            const pin = document.getElementById('pin-input').value.trim();
            const playerName = document.getElementById('name-input').value.trim();

            if(pin.length !== 4 || playerName === "") return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            get(child(ref(db), `rooms/${pin}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    // สร้างผู้เล่นใหม่ และจำรหัสประจำตัว (Key) ไว้
                    const newPlayerRef = push(ref(db, `rooms/${pin}/players`));
                    myPlayerId = newPlayerRef.key; 

                    set(newPlayerRef, {
                        name: playerName,
                        role: "waiting", 
                        status: "alive"
                    }).then(() => {
                        joinSection.classList.add('hidden');
                        waitingSection.classList.remove('hidden');
                        document.getElementById('welcome-name').innerText = `สวัสดี, ${playerName}!`;

                        // 🌟 ดักฟังหน้าจอตัวเองตลอดเวลา ถ้า GM เปลี่ยนบทบาทให้ จะเด้งทันที!
                        onValue(ref(db, `rooms/${pin}/players/${myPlayerId}`), (snap) => {
                            const myData = snap.val();
                            if(myData && myData.role !== "waiting") {
                                showMyRole(myData.role);
                            }
                        });
                    });
                } else {
                    alert("ไม่พบห้องนี้!");
                }
            });
        });

        // ฟังก์ชันเปิดการ์ดโชว์บนหน้าจอ
        function showMyRole(roleCode) {
            waitingSection.classList.add('hidden');
            roleSection.classList.remove('hidden');
            
            // ทำให้การ์ดเด้งขึ้นมา
            setTimeout(() => {
                roleCard.classList.remove('scale-90', 'opacity-0');
                roleCard.classList.add('scale-100', 'opacity-100');
            }, 100);

            const rName = document.getElementById('role-name');
            const rDesc = document.getElementById('role-desc');
            const rIcon = document.getElementById('role-icon');
            const rBox = document.getElementById('role-icon-box');

            if(roleCode === "werewolf") {
                rName.innerText = "หมาป่า"; rName.className = "text-4xl font-black text-rose-500 mb-4";
                rDesc.innerText = "ตื่นขึ้นมาในตอนกลางคืนเพื่อเลือกเหยื่อที่จะกำจัด และแฝงตัวเป็นชาวบ้านในตอนกลางวัน";
                rIcon.className = "ph-fill ph-paw-print text-5xl text-white";
                rBox.className = "w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-lg bg-rose-600";
                roleCard.className = "bg-slate-900 border-2 border-rose-500/50 rounded-3xl p-8 text-center shadow-[0_0_30px_rgba(244,63,94,0.2)]";
            } else if (roleCode === "seer") {
                rName.innerText = "ผู้หยั่งรู้"; rName.className = "text-4xl font-black text-blue-400 mb-4";
                rDesc.innerText = "ตื่นขึ้นมาตอนกลางคืนเพื่อตรวจดูว่าผู้เล่น 1 คนเป็นหมาป่าหรือไม่";
                rIcon.className = "ph-fill ph-eye text-5xl text-white";
                rBox.className = "w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-lg bg-blue-500";
                roleCard.className = "bg-slate-900 border-2 border-blue-500/50 rounded-3xl p-8 text-center shadow-[0_0_30px_rgba(59,130,246,0.2)]";
            } else {
                rName.innerText = "ชาวบ้าน"; rName.className = "text-4xl font-black text-emerald-400 mb-4";
                rDesc.innerText = "ไม่มีความสามารถพิเศษ ต้องใช้การสังเกตและจับโกหกเพื่อหาตัวหมาป่าในตอนกลางวัน";
                rIcon.className = "ph-fill ph-user text-5xl text-white";
                rBox.className = "w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-lg bg-emerald-500";
                roleCard.className = "bg-slate-900 border-2 border-emerald-500/50 rounded-3xl p-8 text-center shadow-[0_0_30px_rgba(16,185,129,0.2)]";
            }
        }
    </script>
</body>
</html>
