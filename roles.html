            },
            { 
                title: "ผู้ดำเนินเกม", 
                subtitle: "Game Moderator", 
                icon: "ph-gavel", 
                roles: gmRole, 
                cardClass: 'gm-card',
                headerText: 'text-slate-400',
                headerBorder: 'border-slate-500/20'
            },
        ];
        
        rolesListContainer.innerHTML = '';
        
        categories.forEach(category => {
            // Category Header
            const headerWrapper = document.createElement('div');
            headerWrapper.className = `flex items-center gap-3 mb-4 mt-8 pb-3 border-b ${category.headerBorder}`;
            
            headerWrapper.innerHTML = `
                <div class="bg-slate-800 p-2 rounded-lg ${category.headerText}">
                    <i class="ph-fill ${category.icon} text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-white">${category.title}</h2>
                    <p class="text-sm text-slate-400">${category.subtitle}</p>
                </div>
            `;
            rolesListContainer.appendChild(headerWrapper);

            // Cards Grid
            const roleCardsGrid = document.createElement('div');
            roleCardsGrid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4';
            
            category.roles.forEach(roleName => {
                const roleData = rolesData[roleName] || { group: 'gm', desc: '-', side: '-' };
                
                // Extract emoji and name
                const firstSpaceIndex = roleName.indexOf(' ');
                const emoji = roleName.substring(0, firstSpaceIndex);
                const name = roleName.substring(firstSpaceIndex + 1);
                
                // Define badge styles based on group
                let badgeColor = 'bg-slate-500/10 text-slate-400 border-slate-500/20';
                if (roleData.group === 'wolf') badgeColor = 'bg-rose-500/10 text-rose-400 border-rose-500/20';
                if (roleData.group === 'villager') badgeColor = 'bg-blue-500/10 text-blue-400 border-blue-500/20';
                if (roleData.group === 'special') badgeColor = 'bg-purple-500/10 text-purple-400 border-purple-500/20';

                const roleCard = document.createElement('div');
                roleCard.className = `role-card bg-slate-800 rounded-xl p-4 border border-slate-700 h-full flex flex-col ${category.cardClass}`;
                
                roleCard.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="text-3xl bg-slate-900/50 p-2 rounded-lg border border-slate-700/50 shadow-inner flex items-center justify-center w-14 h-14">
                            ${emoji}
                        </div>
                        <span class="text-[10px] md:text-xs font-semibold px-2 py-1 rounded-md border ${badgeColor}">
                            ${roleData.side}
                        </span>
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-bold text-lg md:text-xl text-white mb-1">${name}</h3>
                        <p class="text-xs md:text-sm text-slate-400 leading-relaxed">${roleData.desc}</p>
                    </div>
                `;
                roleCardsGrid.appendChild(roleCard);
            });

            rolesListContainer.appendChild(roleCardsGrid);
        });
    }

    // --- Initial Setup ---
    document.addEventListener('DOMContentLoaded', () => {
        populateRolesPage();
    });
</script>

<!-- PWA Service Worker Registration -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
            .then(registration => {
                // ตรวจจับเมื่อมี Service Worker ตัวใหม่ติดตั้งเสร็จ
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // แจ้งเตือนหรือบังคับรีเฟรชเมื่อแอปอัปเดตเสร็จ
                            console.log('New update available! Refreshing...');
                            window.location.reload(); // บังคับรีเฟรชหน้าเพื่อใช้โค้ดใหม่ทันที
                        }
                    });
                });
            })
            .catch(err => console.log('SW error:', err));
        });
    }
</script>
